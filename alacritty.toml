import = [
    "~/.config/alacritty/themes/themes/catppuccin.toml"
]

[env]
TERM = 'xterm-256color'

[window]
padding.x = 10
padding.y = 10
dimensions = {columns = 130, lines = 40}
startup_mode = "Maximized"
decorations = 'Buttonless'

opacity = 0.9
blur = true

[font]
normal.family = 'MesloLGS NF'
size = 16
